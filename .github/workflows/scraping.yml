name: Scraping Automatique France Travail

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Installer les dependances
      run: pip install -r requirements.txt

    - name: Installer Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: 1 - Lancer le scraping
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python scraping/france_travail_scrap.py

    - name: 2 - Nettoyer les donnees
      run: python processing/preprocess_france_travail.py

    - name: 3 - Importer dans Supabase
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python database/import_supabase.py

    - name: 4 - Verifier les offres expirees
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python scraping/verifier_expiration.py

    - name: 5 - Lancer embeddings
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python backend/calcul_embeddings.py

    - name: 6 - Sauvegarder le cache embeddings
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add backend/embeddings.npy backend/offres_cache.json
        git commit -m "Update embeddings cache" || echo "Rien a committer"
        git push