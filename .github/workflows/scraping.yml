name: Scraping Automatique France Travail

on:
  schedule:
    - cron: '0 6 * * *'    # tous les jours à 6h du matin
  workflow_dispatch:         # permet de lancer manuellement

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Installer les dépendances
      run: pip install -r requirements.txt

    - name: Installer Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: 1 - Lancer le scraping
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python scraping/france_travail_scrap.py

    - name: 2 - Nettoyer les données
      run: python processing/preprocess_france_travail.py

    - name: 3 - Importer dans Supabase
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python database/import_supabase.py

    - name: 4 - Vérifier les offres expirées
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python scraping/verifier_expiration.py